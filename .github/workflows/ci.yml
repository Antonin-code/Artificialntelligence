name: StudCall Industrial CI

on:
  push:
    branches: [ main, develop, 'features/*' ]
  pull_request:
    branches: [ main, develop, 'features/*' ]

jobs:
  quality-assurance:
    name: Code Quality and Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: studcall/package-lock.json

    - name: Install Dependencies
      run: npm ci
      working-directory: studcall

    - name: Linting Check
      run: npm run lint
      working-directory: studcall

    - name: Type Checking
      run: npx tsc --noEmit
      working-directory: studcall

    - name: Unit & Integration Tests
    # This runs Vitest with all the tests we created in US29 and US30
      run: npm test
      working-directory: studcall

    - name: Production Build Check
    # Ensures the Next.js app can be successfully compiled for production
      run: npm run build
      working-directory: studcall
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  sonarqube:
    name: SonarQube Analysis
    needs: quality-assurance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }} # Optionnel si SonarCloud
